name: Telegram File Stream Bot

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

concurrency:
  group: bot-session
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env with secrets
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          LOG_CHANNEL: ${{ secrets.LOG_CHANNEL }}
          ALLOWED_USERS: ${{ secrets.ALLOWED_USERS }}
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          cat > .env << EOF
          BOT_TOKEN=${BOT_TOKEN}
          API_ID=${API_ID}
          API_HASH=${API_HASH}
          LOG_CHANNEL=${LOG_CHANNEL}
          ALLOWED_USERS=${ALLOWED_USERS}
          PORT=8080
          HASH_LENGTH=6
          EOF

      - name: Install & start ngrok tunnel
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          if [ -z "${NGROK_TOKEN}" ]; then
            echo "No NGROK_TOKEN set — using localhost only"
            exit 0
          fi
          curl -sL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-linux-amd64.tgz -o ngrok.tgz
          tar xzf ngrok.tgz
          ./ngrok config add-authtoken "${NGROK_TOKEN}"
          nohup ./ngrok http --url=pancreas-balmy-wrecker.ngrok-free.dev 8080 > ngrok.log 2>&1 &
          sleep 5
          echo "HOST=https://pancreas-balmy-wrecker.ngrok-free.dev" >> .env

      - name: Run bot
        run: |
          python -u main.py
